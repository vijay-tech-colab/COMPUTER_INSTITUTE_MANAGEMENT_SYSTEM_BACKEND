version: '3.8'

services:
  # Backend API
  api:
    build: .
    container_name: cims_api
    restart: always
    ports:
      - "9000:9000"
    environment:
      - NODE_ENV=production
      - MONGO_URI=mongodb://mongodb:27017/cims
      - REDIS_URL=redis://redis:6379
      - RABBITMQ_URL=amqp://rabbitmq:5672
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRE=${JWT_EXPIRE}
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASSWORD=${SMTP_PASSWORD}
      - CLOUDINARY_CLOUD_NAME=${CLOUDINARY_CLOUD_NAME}
      - CLOUDINARY_API_KEY=${CLOUDINARY_API_KEY}
      - CLOUDINARY_API_SECRET=${CLOUDINARY_API_SECRET}
      - FRONTEND_URL=${FRONTEND_URL}
    depends_on:
      - mongodb
      - redis
      - rabbitmq

  # MongoDB Database
  mongodb:
    image: mongo:latest
    container_name: cims_mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db

  # Redis Cache
  redis:
    image: redis:alpine
    container_name: cims_redis
    ports:
      - "6379:6379"

  # Redis UI
  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: cims_redis_ui
    environment:
      - REDIS_HOSTS=local:redis:6379
    ports:
      - "8081:8081"
    depends_on:
      - redis

  # RabbitMQ Message Broker
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: cims_rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672" # Management UI

volumes:
  mongodb_data:
